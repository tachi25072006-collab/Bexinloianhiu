<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Anh iu ơi</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700&display=swap" rel="stylesheet">

<style>

body{
background:#f9ecef;
font-family:'Baloo 2',cursive;
text-align:center;
margin:0;
padding:20px;
overflow:hidden;
}

.cat{
width:300px;
max-width:85%;
margin-top:40px;
}

.text{
font-size:42px;
color:#ff3fa4;
line-height:1.2;
}

button{
padding:15px 30px;
font-size:22px;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
margin:10px;
}

#yes{
background:#35c84a;
}

#no{
background:#f44336;
position:relative;
}

.heart{
position:fixed;
font-size:30px;
animation:fly 3s linear forwards;
}

@keyframes fly{
from{
opacity:1;
transform:translateY(0);
}
to{
opacity:0;
transform:translateY(-400px);
}
}

.footer{
margin-top:30px;
color:#ff8db6;
font-size:22px;
}

</style>
</head>

<body>

<img src="cat.png" class="cat">

<div class="text">
Anh iu ơi cho em xin lỗi nhóoooo 😭<br>
Anh hong chọn hoặc thoát là tha lỗi cho em đó
</div>

<br>

<button id="yes">Anh tha lỗi</button>
<button id="no">Không bao giờ</button>

<div class="footer">
♥ Em yêu anh nhiều lắm ạ
</div>

<script>

const noBtn=document.getElementById("no");

function moveButton(){
let x=Math.random()*(window.innerWidth-150);
let y=Math.random()*(window.innerHeight-100);

noBtn.style.position="fixed";
noBtn.style.left=x+"px";
noBtn.style.top=y+"px";
}

noBtn.addEventListener("mouseover",moveButton);
noBtn.addEventListener("touchstart",moveButton);

document.getElementById("yes").onclick=function(){

alert("Yayyyy ❤️ Em biết anh iu sẽ tha lỗi cho em mà!");

for(let i=0;i<40;i++){

let heart=document.createElement("div");

heart.innerHTML="❤️";
heart.className="heart";

heart.style.left=Math.random()*window.innerWidth+"px";
heart.style.top=window.innerHeight+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},3000);
}
}

</script>

</body>
</html>
