<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Anh iu ơi 🥺</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#ffeef3;
    font-family:'Baloo 2',cursive;
    text-align:center;
    min-height:100vh;
    overflow:hidden;
    padding:20px;
}

#slide{
    width:320px;
    max-width:90%;
    border-radius:20px;
    margin-top:20px;
    box-shadow:0 8px 20px rgba(0,0,0,.15);
}

.title{
    color:#ff3fa4;
    font-size:40px;
    line-height:1.2;
    margin:20px auto;
}

.sub{
    color:#ff77b7;
    font-size:22px;
}

.buttons{
    margin-top:25px;
}

button{
    border:none;
    border-radius:12px;
    padding:15px 28px;
    font-size:22px;
    color:white;
    cursor:pointer;
}

#yes{
    background:#37c84d;
}

#no{
    background:#f44336;
    margin-left:10px;
}

#message{
    margin-top:20px;
    color:#ff4fa8;
    font-size:24px;
    font-weight:bold;
    min-height:50px;
}

.footer{
    margin-top:20px;
    color:#ff7cb8;
    font-size:22px;
}

.heart{
    position:fixed;
    font-size:30px;
    pointer-events:none;
    animation:fly 3s linear forwards;
}

@keyframes fly{
    from{
        opacity:1;
        transform:translateY(0);
    }
    to{
        opacity:0;
        transform:translateY(-500px);
    }
}

</style>

</head>

<body>

<img id="slide" src="1.gif" alt="Ảnh xin lỗi">

<div class="title" id="titleText">
Anh iu ơi cho em xin lỗi nhóoooo 😭
</div>

<div class="sub" id="subText">
Anh hong chọn hoặc thoát là tha lỗi cho em đó 🥺
</div>

<div class="buttons">
    <button id="yes">Thoi đượt gòi 😒</button>
    <button id="no">Không bao giờ 😤</button>
</div>

<div id="message"></div>

<div class="footer">
♥ Anh iu tha lỗi cho em nhé ạa ♥
</div>

<script>

const images = [
    "2.jpg",
    "3.jpg",
    "4.jpg",
    "5.jpg",
    "6.jpg"
];

const messages = [
    "Em bíc lỗi rùi ạ 🥺",
    "Bé xin lỗi anh nhìu ạ 😭",
    "Em iu anh lắm lắm ạ ❤️",
    "Anh đẹp try tha lỗi cho bé nha nha 🥰",
    "Bé hứa ngoan hơn ạ 🥺",
    "Anh đừng giận em nũa được hong 😭",
    "Em iu anh nhất luôn đó ❤️",
    "Em nhớ anh lắm ạ 🥹",
    "Anh iu tha lỗi cho tui nhaaa 💕"
];

let currentImage = 0;
let rejectCount = 0;

const slide = document.getElementById("slide");
const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const message = document.getElementById("message");

function moveButton(){

    rejectCount++;

    if(rejectCount === 1){
        document.getElementById("titleText").style.display = "none";
        document.getElementById("subText").style.display = "none";
    }

    if(currentImage < images.length){
        slide.src = images[currentImage];
        currentImage++;
    }

    if(rejectCount <= messages.length){
        message.innerHTML = messages[rejectCount - 1];
    }

    if(rejectCount >= 10){
        noBtn.style.display = "none";
        message.innerHTML = "Nút không đồng ý bỏ nhà đi mất gòi 🥺";
        return;
    }

    const x = Math.random() * (window.innerWidth - 180);
    const y = Math.random() * (window.innerHeight - 100);

    noBtn.style.position = "fixed";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("touchstart", moveButton);

yesBtn.onclick = function(){

    slide.src = "7.jpg";

    document.getElementById("titleText").style.display = "none";
    document.getElementById("subText").style.display = "none";

    document.getElementById("footerText").innerHTML =
    "♥ Em yêu anh nhiều lắm ạ ♥";

    noBtn.style.display = "none";
    yesBtn.style.display = "none";

    message.innerHTML =
    "Yayyyy ❤️ Em biết anh iu sẽ tha lỗi cho em mà!";

    for(let i = 0; i < 60; i++){

        const heart = document.createElement("div");

        heart.className = "heart";
        heart.innerHTML = "❤️";

        heart.style.left =
        Math.random() * window.innerWidth + "px";

        heart.style.top =
        window.innerHeight + "px";

        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 3000);
    }

    setTimeout(() => {
        alert("Cảm ơn anh iu đã tha lỗi cho emm, em iu anh nhìu ạaa 😚");
    }, 500);
};

</script>

</body>
</html>
